name: Patch Factura

on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch factura (bloc "Necesito factura" al carret)
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          PYTHONUNBUFFERED: '1'
        run: python -u patch_factura.py

      - name: Upload backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: factura-backup
          path: backup_theme_liquid_factura.liquid
