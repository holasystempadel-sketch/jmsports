name: Rename Handles (treure jimsports-)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = nomes mostra el mapping, no canvia res'
        required: true
        default: 'true'

jobs:
  rename:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run rename
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          PYTHONUNBUFFERED: '1'
        run: python -u rename_handles.py

      - name: Upload mapping
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: handles-map
          path: handles_map.json
